<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dendritic River Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui">

        <h2>🌊 River Generator V2</h2>

        <div class="control-group">
            <label for="cap">Max Shreve Magnitude</label>
            <input
                type="number"
                id="cap"
                value="1000"
                min="10"
                max="1000000">
        </div>

        <div class="control-group">
            <label for="speed">Growth Speed</label>
            <input
                type="range"
                id="speed"
                min="1"
                max="100"
                value="20">
        </div>

        <div class="control-group">
            <label for="spread">Branch Spread</label>
            <input
                type="range"
                id="spread"
                min="5"
                max="80"
                value="25">
        </div>

        <div class="buttons">
            <button id="generateBtn">
                Generate
            </button>

            <button id="pauseBtn">
                Pause
            </button>

            <button id="exportBtn">
                Export PNG
            </button>
        </div>

        <hr>

        <div id="stats">

            <p>
                <strong>Current Magnitude:</strong>
                <span id="currentMagnitude">0</span>
            </p>

            <p>
                <strong>Outlet Magnitude:</strong>
                <span id="outletMagnitude">0</span>
            </p>

            <p>
                <strong>Strahler Order:</strong>
                <span id="strahlerOrder">0</span>
            </p>

            <p>
                <strong>Branches:</strong>
                <span id="branchCount">0</span>
            </p>

            <p>
                <strong>Status:</strong>
                <span id="status">Idle</span>
            </p>

        </div>

    </div>

    <canvas id="riverCanvas"></canvas>

    <script src="script.js"></script>

</body>
</html>
